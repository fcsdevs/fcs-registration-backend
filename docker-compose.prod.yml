version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fcs-reg-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: fcs_registration_db
    volumes:
      - postgres_data_prod:/var/lib/postgresql/data
      - ./backups:/backups
    networks:
      - fcs-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fcs-reg-redis
    command: redis-server --appendonly yes --requirepass ${REDIS_PASSWORD:-fcs-redis-pass}
    networks:
      - fcs-network
    restart: unless-stopped

  api:
    build: .
    container_name: fcs-reg-api
    ports:
      - "4005:5005"
    env_file: .env
    environment:
      # These overrides ensure the API can find the containers
      DATABASE_URL: "postgresql://postgres:${POSTGRES_PASSWORD:-postgres}@postgres:5432/fcs_registration_db"
      REDIS_URL: "redis://:${REDIS_PASSWORD:-fcs-redis-pass}@redis:6379"
      PORT: 5005
    # The CMD is handled by the Dockerfile, but can be overridden here if needed
    depends_on:
      - postgres
      - redis
    networks:
      - fcs-network
    volumes:
      - ./backups:/app/backups
    restart: unless-stopped

volumes:
  postgres_data_prod:

networks:
  fcs-network:
    driver: bridge
