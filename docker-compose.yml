services:
  app:
    build: .
    container_name: fcs-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5005:5005"
    volumes:
      - ./backups:/app/backups
    depends_on:
      - postgres
    networks:
      - fcs-network

  postgres:
    image: postgres:16
    container_name: fcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fcs_registration_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - fcs-network

volumes:
  postgres_data:

networks:
  fcs-network:
