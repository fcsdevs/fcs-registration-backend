services:
  app:
    build: .
    container_name: fcs-api
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "5005:5005"
      - "127.0.0.1:5555:5555"
    volumes:
      - ./backups:/app/backups
    depends_on:
      - postgres
    networks:
      - proxy

  postgres:
    image: postgres:16
    container_name: fcs-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: fcs_registration_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - proxy

volumes:
  postgres_data:

networks:
  proxy:
