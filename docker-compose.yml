version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: fcs-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-fcs_registration_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backups:/backups
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fcs-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: fcs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - fcs-network
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fcs-api
    env_file: .env
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-fcs_registration_db}
      PORT: 5005
    volumes:
      - ./backups:/app/backups
      - ./fcs-backup-drive-1d0e5974e2b6.json:/app/google-drive-credentials.json:ro
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - fcs-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    build:
      context: ../fcs-registration-system/frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: https://api.registration.fcsnigeria.org/api
    container_name: fcs-frontend
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_API_URL: https://api.registration.fcsnigeria.org/api
      PORT: 3000
    depends_on:
      api:
        condition: service_started
    networks:
      - fcs-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  nginx:
    image: nginx:alpine
    container_name: fcs-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/conf.d:/etc/nginx/conf.d:ro
      - /etc/letsencrypt:/etc/letsencrypt:ro
      - /var/www/fcsregistration/fcs-registration-backend/public:/var/www/html:ro
    depends_on:
      api:
        condition: service_started
      frontend:
        condition: service_started
    networks:
      - fcs-network
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  fcs-network:
    driver: bridge
