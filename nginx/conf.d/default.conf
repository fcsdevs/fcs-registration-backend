server {
    listen 80;
    server_name registration.fcsnigeria.org api.fcsnigeria.org api.registration.fcsnigeria.org;
    
    # Redirect all HTTP traffic to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# API Configuration
server {
    listen 443 ssl;
    server_name api.fcsnigeria.org api.registration.fcsnigeria.org;

    ssl_certificate /etc/letsencrypt/live/registration.fcsnigeria.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registration.fcsnigeria.org/privkey.pem;

    location / {
        proxy_pass http://api:5005; 
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}

# Frontend Configuration
server {
    listen 443 ssl;
    server_name registration.fcsnigeria.org;

    ssl_certificate /etc/letsencrypt/live/registration.fcsnigeria.org/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/registration.fcsnigeria.org/privkey.pem;

    location / {
        proxy_pass http://frontend:3000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }
}
